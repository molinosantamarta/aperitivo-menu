<script>
  const state = {
    sections: [],
    items: [],
    settings: {},
    currentItemId: "",
    isCreating: true,
    view: "chooser",
    editorReturnView: "chooser",
    editorStep: 0,
    filters: {
      search: "",
      sectionId: "",
    },
    lastMessage: "",
  };

  const els = {};
  let headerStatusTimer = 0;

  document.addEventListener("DOMContentLoaded", () => {
    cacheElements();
    bindEvents();
    loadBootstrap("Carico catalogo e impostazioni...");
  });

  function cacheElements() {
    els.brandIcon = document.getElementById("brandIcon");
    els.headerStatus = document.getElementById("headerStatus");
    els.headerStatusText = document.getElementById("headerStatusText");
    els.helpButton = document.getElementById("helpButton");
    els.helpModal = document.getElementById("helpModal");
    els.helpBackdrop = document.getElementById("helpBackdrop");
    els.closeHelpButton = document.getElementById("closeHelpButton");
    els.entryPanel = document.getElementById("entryPanel");
    els.entryCreateButton = document.getElementById("entryCreateButton");
    els.entryBrowseButton = document.getElementById("entryBrowseButton");
    els.refreshButton = document.getElementById("refreshButton");
    els.browseModal = document.getElementById("browseModal");
    els.editorModal = document.getElementById("editorModal");
    els.browseBackButton = document.getElementById("browseBackButton");
    els.editorScreenBackButton = document.getElementById("editorScreenBackButton");
    els.editorScreenBackLabel = document.getElementById("editorScreenBackLabel");
    els.editorStepIndicator = document.getElementById("editorStepIndicator");
    els.editorSteps = Array.from(document.querySelectorAll(".editor-step"));
    els.editorStepBackButton = document.getElementById("editorStepBackButton");
    els.editorStepNextButton = document.getElementById("editorStepNextButton");
    els.searchInput = document.getElementById("searchInput");
    els.sectionFilter = document.getElementById("sectionFilter");
    els.catalogMeta = document.getElementById("catalogMeta");
    els.itemList = document.getElementById("itemList");
    els.editorTitle = document.getElementById("editorTitle");
    els.editorMeta = document.getElementById("editorMeta");
    els.itemForm = document.getElementById("itemForm");
    els.saveButton = document.getElementById("saveButton");
    els.deleteButton = document.getElementById("deleteButton");

    els.idInput = document.getElementById("idInput");
    els.nameInput = document.getElementById("nameInput");
    els.sectionInput = document.getElementById("sectionInput");
    els.descriptionInput = document.getElementById("descriptionInput");
    els.categoryInput = document.getElementById("categoryInput");
    els.sortOrderInput = document.getElementById("sortOrderInput");
    els.visibilityInput = document.getElementById("visibilityInput");
    els.availabilityInput = document.getElementById("availabilityInput");
    els.renderModeInput = document.getElementById("renderModeInput");
    els.imageUrlInput = document.getElementById("imageUrlInput");
    els.option1LabelInput = document.getElementById("option1LabelInput");
    els.option1DisplayLabelInput = document.getElementById("option1DisplayLabelInput");
    els.option1PriceInput = document.getElementById("option1PriceInput");
    els.option2LabelInput = document.getElementById("option2LabelInput");
    els.option2DisplayLabelInput = document.getElementById("option2DisplayLabelInput");
    els.option2PriceInput = document.getElementById("option2PriceInput");
    els.option3LabelInput = document.getElementById("option3LabelInput");
    els.option3DisplayLabelInput = document.getElementById("option3DisplayLabelInput");
    els.option3PriceInput = document.getElementById("option3PriceInput");
    els.detailHintInput = document.getElementById("detailHintInput");
    els.legacyManagedInput = document.getElementById("legacyManagedInput");
    els.notesInput = document.getElementById("notesInput");
  }

  function bindEvents() {
    els.helpButton?.addEventListener("click", openHelpModal);
    els.helpBackdrop?.addEventListener("click", closeHelpModal);
    els.closeHelpButton?.addEventListener("click", closeHelpModal);
    els.entryCreateButton.addEventListener("click", enterCreateMode);
    els.entryBrowseButton.addEventListener("click", enterBrowseMode);
    els.refreshButton.addEventListener("click", () => loadBootstrap("Ricarico catalogo e impostazioni..."));
    els.browseBackButton?.addEventListener("click", returnToChooser);
    els.editorScreenBackButton?.addEventListener("click", handleEditorScreenBack);
    els.editorStepBackButton?.addEventListener("click", handleEditorStepBack);
    els.editorStepNextButton?.addEventListener("click", handleEditorStepNext);
    els.deleteButton.addEventListener("click", handleDelete);
    els.searchInput.addEventListener("input", (event) => {
      state.filters.search = event.target.value.trim().toLowerCase();
      renderItemList();
    });
    els.sectionFilter.addEventListener("change", (event) => {
      state.filters.sectionId = event.target.value;
      renderItemList();
    });
    els.itemForm.addEventListener("submit", handleSave);
    els.nameInput.addEventListener("input", () => {
      if (state.isCreating && !els.idInput.dataset.locked) {
        els.idInput.value = slugify(els.nameInput.value);
      }
    });
    els.idInput.addEventListener("input", () => {
      els.idInput.dataset.locked = els.idInput.value.trim() ? "true" : "";
    });
    els.sectionInput.addEventListener("change", () => {
      if (state.isCreating && !els.sortOrderInput.value.trim()) {
        els.sortOrderInput.value = String(getSuggestedSortOrder(els.sectionInput.value));
      }
    });
    document.addEventListener("keydown", handleGlobalKeydown);
  }

  function loadBootstrap(message) {
    hideBanner();
    setBusy(true, message || "Carico...");
    google.script.run
      .withSuccessHandler((payload) => {
        state.sections = Array.isArray(payload.sections) ? payload.sections : [];
        state.items = Array.isArray(payload.items) ? payload.items : [];
        state.settings = payload.settings || {};

        applyBrandIcon();
        renderSectionOptions();
        renderSummary(payload);
        syncCurrentView();

        renderItemList();
        updateInterfaceState();
        setBusy(false);
        if (state.lastMessage) {
          showBanner(state.lastMessage, "success");
          state.lastMessage = "";
        }
      })
      .withFailureHandler(handleFailure)
      .getBootstrapData();
  }

  function handleSave(event) {
    event.preventDefault();

    if (state.editorStep < els.editorSteps.length - 1) {
      handleEditorStepNext();
      return;
    }

    const payload = collectFormPayload();
    setBusy(true, "Salvo il prodotto nel database menu...");

    google.script.run
      .withSuccessHandler((result) => {
        state.view = "edit";
        state.currentItemId = result.item.id;
        state.lastMessage = state.isCreating ? "Prodotto creato." : "Prodotto aggiornato.";
        loadBootstrap("Aggiorno catalogo e impostazioni...");
      })
      .withFailureHandler(handleFailure)
      .saveItem(payload);
  }

  function handleFailure(error) {
    const message =
      error && error.message ? error.message : "C'e stato un problema durante l'operazione richiesta.";
    setBusy(false);
    showBanner(message, "error");
  }

  function handleGlobalKeydown(event) {
    if (event.key === "Escape" && els.helpModal && !els.helpModal.hidden) {
      closeHelpModal();
    }
  }

  function applyBrandIcon() {
    if (!els.brandIcon) {
      return;
    }

    const isLocalPreview = ["localhost", "127.0.0.1"].includes(window.location.hostname);
    const iconUrl = state.settings.brand_icon_url || (isLocalPreview ? els.brandIcon.dataset.localSrc : "");

    if (!iconUrl) {
      els.brandIcon.hidden = true;
      return;
    }

    els.brandIcon.hidden = false;
    els.brandIcon.src = iconUrl;
  }

  function openHelpModal() {
    if (!els.helpModal) {
      return;
    }

    els.helpModal.hidden = false;
    document.body.classList.add("is-utility-modal-open");
  }

  function closeHelpModal() {
    if (!els.helpModal) {
      return;
    }

    els.helpModal.hidden = true;
    document.body.classList.remove("is-utility-modal-open");
  }

  function handleDelete() {
    if (state.isCreating || !state.currentItemId) {
      return;
    }

    const currentItem = state.items.find((item) => item.id === state.currentItemId);
    const itemLabel = currentItem?.name || state.currentItemId;
    const confirmed = window.confirm(`Eliminare definitivamente "${itemLabel}" da Menumal?`);

    if (!confirmed) {
      return;
    }

    setBusy(true, "Elimino il prodotto dal database menu...");

    google.script.run
      .withSuccessHandler(() => {
        const returnView = state.editorReturnView === "browse" ? "browse" : "chooser";
        state.currentItemId = "";
        state.isCreating = false;
        state.view = returnView;
        state.editorStep = 0;
        state.lastMessage = "Prodotto eliminato.";
        loadBootstrap("Aggiorno catalogo e impostazioni...");
      })
      .withFailureHandler(handleFailure)
      .deleteItem(state.currentItemId);
  }

  function renderSectionOptions() {
    const optionsMarkup = ['<option value="">Tutte le sezioni</option>']
      .concat(
        state.sections.map((section) => {
          return `<option value="${escapeHtml(section.section_id)}">${escapeHtml(section.title || section.section_id)}</option>`;
        })
      )
      .join("");

    const editorOptionsMarkup = state.sections
      .map((section) => {
        return `<option value="${escapeHtml(section.section_id)}">${escapeHtml(section.title || section.section_id)}</option>`;
      })
      .join("");

    els.sectionFilter.innerHTML = optionsMarkup;
    els.sectionFilter.value = state.filters.sectionId;
    els.sectionInput.innerHTML = editorOptionsMarkup;
  }

  function renderSummary(payload) {
    const editorLabel = payload.actorEmail || payload.actorLabel || "account connesso";
    els.editorMeta.textContent = `Accesso: ${editorLabel}`;
  }

  function renderCatalogMeta(filteredItems = getFilteredItems()) {
    const hiddenItemsCount = filteredItems.filter((item) => item.visibility_state === "nascosto").length;
    const visibleSectionsCount = new Set(
      filteredItems
        .map((item) => item.section_id)
        .filter(Boolean)
    ).size;
    const hasActiveFilters = Boolean(state.filters.search || state.filters.sectionId);
    const itemsLabel = hasActiveFilters
      ? `${filteredItems.length} di ${state.items.length} prodotti`
      : `${state.items.length} prodotti`;
    const sectionsLabel = hasActiveFilters ? visibleSectionsCount : state.sections.length;

    els.catalogMeta.innerHTML = `
      <span class="catalog-pill catalog-pill--strong">${itemsLabel}</span>
      <span class="catalog-pill">${sectionsLabel} sezioni</span>
      <span class="catalog-pill">${hiddenItemsCount} nascosti</span>
    `;
  }

  function renderItemList() {
    const filteredItems = getFilteredItems();
    renderCatalogMeta(filteredItems);

    if (!filteredItems.length) {
      els.itemList.innerHTML = `<div class="item-list__empty">Nessun prodotto trovato con questi filtri.</div>`;
      return;
    }

    els.itemList.innerHTML = filteredItems
      .map((item) => {
        const priceLabel = formatItemListPrice(item);
        const badges = [
          renderBadge(
            item.visibility_state === "nascosto" ? "Nascosto" : "Visibile",
            item.visibility_state === "nascosto" ? "hidden" : "success"
          ),
          renderBadge(item.availability_state || "disponibile", getAvailabilityBadgeTone(item.availability_state)),
        ]
          .join("");

        return `
          <button class="item-row${item.id === state.currentItemId && !state.isCreating ? " is-active" : ""}" type="button" data-item-id="${escapeHtml(item.id)}">
            <div class="item-row__top">
              <span class="item-row__name">${escapeHtml(item.name || item.id)}</span>
              <span class="item-row__price">${escapeHtml(priceLabel)}</span>
            </div>
            <div class="item-row__meta">
              <span>${escapeHtml(resolveSectionLabel(item.section_id))}</span>
              <span>${escapeHtml(item.id)}</span>
            </div>
            <div class="badge-row">${badges}</div>
          </button>
        `;
      })
      .join("");

    Array.from(els.itemList.querySelectorAll("[data-item-id]")).forEach((button) => {
      button.addEventListener("click", () => {
        const item = state.items.find((entry) => entry.id === button.dataset.itemId);
        if (!item) {
          return;
        }

        fillForm(item);
        state.view = "edit";
        state.currentItemId = item.id;
        state.isCreating = false;
        state.editorReturnView = "browse";
        renderItemList();
        updateInterfaceState();
      });
    });
  }

  function getFilteredItems() {
    return state.items.filter((item) => {
      if (state.filters.sectionId && item.section_id !== state.filters.sectionId) {
        return false;
      }

      if (!state.filters.search) {
        return true;
      }

      const haystack = [item.id, item.name, item.description, item.category]
        .join(" ")
        .toLowerCase();
      return haystack.includes(state.filters.search);
    });
  }

  function formatItemListPrice(item) {
    const rawPrice = item.option_1_price || item.option_2_price || item.option_3_price || "";
    if (!rawPrice) {
      return "-";
    }

    return `€ ${rawPrice}`;
  }

  function openCreateForm() {
    state.isCreating = true;
    state.currentItemId = "";
    state.editorStep = 0;
    els.itemForm.reset();
    els.idInput.dataset.locked = "";
    els.visibilityInput.value = "visibile";
    els.availabilityInput.value = "disponibile";
    els.renderModeInput.value = "standard";
    els.detailHintInput.checked = true;
    els.legacyManagedInput.checked = false;

    const preferredSectionId = state.filters.sectionId || state.sections[0]?.section_id || "";
    if (preferredSectionId) {
      els.sectionInput.value = preferredSectionId;
      els.sortOrderInput.value = String(getSuggestedSortOrder(preferredSectionId));
    }

    els.editorTitle.textContent = "Nuovo prodotto";
    els.editorMeta.textContent = "Compila i campi e salva.";
    updateSaveButtonLabel();
    updateDeleteButton();
    updateEditorScreenBackLabel();
    updateEditorStepUI();
    renderItemList();
  }

  function fillForm(item) {
    state.currentItemId = item.id;
    state.isCreating = false;
    state.editorStep = 0;
    els.editorTitle.textContent = item.name || item.id;
    els.editorMeta.textContent = `${resolveSectionLabel(item.section_id)} · id ${item.id}`;

    els.idInput.value = item.id || "";
    els.idInput.dataset.locked = item.id ? "true" : "";
    els.nameInput.value = item.name || "";
    els.sectionInput.value = item.section_id || "";
    els.descriptionInput.value = item.description || "";
    els.categoryInput.value = item.category || "";
    els.sortOrderInput.value = item.sort_order || "";
    els.visibilityInput.value = item.visibility_state || "visibile";
    els.availabilityInput.value = item.availability_state || "disponibile";
    els.renderModeInput.value = item.render_mode || "standard";
    els.imageUrlInput.value = item.image_url || "";
    els.option1LabelInput.value = item.option_1_label || "";
    els.option1DisplayLabelInput.value = item.option_1_display_label || "";
    els.option1PriceInput.value = item.option_1_price || "";
    els.option2LabelInput.value = item.option_2_label || "";
    els.option2DisplayLabelInput.value = item.option_2_display_label || "";
    els.option2PriceInput.value = item.option_2_price || "";
    els.option3LabelInput.value = item.option_3_label || "";
    els.option3DisplayLabelInput.value = item.option_3_display_label || "";
    els.option3PriceInput.value = item.option_3_price || "";
    els.detailHintInput.checked = normalizeToggle(item.show_detail_hint, true);
    els.legacyManagedInput.checked = normalizeToggle(item.legacy_sheet_managed, false);
    els.notesInput.value = item.notes || "";
    updateSaveButtonLabel();
    updateDeleteButton();
    updateEditorScreenBackLabel();
    updateEditorStepUI();
  }

  function enterCreateMode() {
    state.view = "create";
    state.editorReturnView = "chooser";
    openCreateForm();
    updateInterfaceState();
  }

  function enterBrowseMode() {
    state.view = "browse";
    state.isCreating = false;
    state.editorReturnView = "browse";
    state.editorStep = 0;
    updateDeleteButton();
    updateInterfaceState();
    window.setTimeout(() => {
      els.searchInput?.focus();
      els.searchInput?.select();
    }, 50);
  }

  function syncCurrentView() {
    if (state.view === "create") {
      state.editorReturnView = "chooser";
      openCreateForm();
      return;
    }

    if (state.view === "edit" && state.currentItemId) {
      const currentItem = state.items.find((item) => item.id === state.currentItemId);
      if (currentItem) {
        fillForm(currentItem);
        state.isCreating = false;
        return;
      }
    }

    state.currentItemId = "";
    state.isCreating = false;
    state.editorStep = 0;
    if (!state.items.length) {
      state.view = "create";
      state.editorReturnView = "chooser";
      openCreateForm();
      return;
    }

    if (state.view !== "browse") {
      state.view = "chooser";
      state.editorReturnView = "chooser";
    }
  }

  function updateInterfaceState() {
    document.body.dataset.view = state.view;
    document.body.dataset.editorStep = String(state.editorStep);
    document.body.classList.toggle("is-screen-flow-open", state.view !== "chooser");
    els.entryPanel.hidden = state.view !== "chooser";
    els.browseModal.hidden = !(state.view === "browse" || (state.view === "edit" && state.editorReturnView === "browse"));
    els.editorModal.hidden = !(state.view === "create" || state.view === "edit");
    updateEditorScreenBackLabel();
    updateEditorStepUI();
  }

  function collectFormPayload() {
    const idValue = els.idInput.value.trim() || slugify(els.nameInput.value);

    return {
      id: idValue,
      name: els.nameInput.value.trim(),
      section_id: els.sectionInput.value,
      description: els.descriptionInput.value.trim(),
      category: els.categoryInput.value.trim(),
      sort_order: els.sortOrderInput.value.trim(),
      visibility_state: els.visibilityInput.value,
      availability_state: els.availabilityInput.value,
      render_mode: els.renderModeInput.value,
      image_url: els.imageUrlInput.value.trim(),
      option_1_label: els.option1LabelInput.value.trim(),
      option_1_display_label: els.option1DisplayLabelInput.value.trim(),
      option_1_price: els.option1PriceInput.value.trim(),
      option_2_label: els.option2LabelInput.value.trim(),
      option_2_display_label: els.option2DisplayLabelInput.value.trim(),
      option_2_price: els.option2PriceInput.value.trim(),
      option_3_label: els.option3LabelInput.value.trim(),
      option_3_display_label: els.option3DisplayLabelInput.value.trim(),
      option_3_price: els.option3PriceInput.value.trim(),
      show_detail_hint: els.detailHintInput.checked,
      legacy_sheet_managed: els.legacyManagedInput.checked,
      notes: els.notesInput.value.trim(),
    };
  }

  function getSuggestedSortOrder(sectionId) {
    return (
      state.items
        .filter((item) => item.section_id === sectionId)
        .reduce((maxValue, item) => {
          const current = Number.parseInt(item.sort_order, 10);
          return Number.isFinite(current) ? Math.max(maxValue, current) : maxValue;
        }, 0) + 1
    );
  }

  function resolveSectionLabel(sectionId) {
    const section = state.sections.find((entry) => entry.section_id === sectionId);
    return section ? section.title || section.section_id : sectionId || "Sezione";
  }

  function renderBadge(label, tone = "") {
    return `<span class="badge${tone ? ` badge--${tone}` : ""}">${escapeHtml(label)}</span>`;
  }

  function getAvailabilityBadgeTone(value) {
    if (value === "in arrivo") {
      return "warning";
    }
    if (value === "non disponibile") {
      return "danger";
    }
    if (value === "al carretto") {
      return "info";
    }
    return "success";
  }

  function setBusy(isBusy, message = "") {
    document.body.style.cursor = isBusy ? "progress" : "";
    els.refreshButton.disabled = isBusy;
    if (els.browseBackButton) els.browseBackButton.disabled = isBusy;
    if (els.editorScreenBackButton) els.editorScreenBackButton.disabled = isBusy;
    if (els.editorStepBackButton) els.editorStepBackButton.disabled = isBusy;
    if (els.editorStepNextButton) els.editorStepNextButton.disabled = isBusy;
    els.itemForm.querySelectorAll("input, select, textarea, button").forEach((element) => {
      element.disabled = isBusy;
    });

    if (isBusy && message) {
      showHeaderStatus(message, "info", { persistent: true });
      return;
    }

    clearHeaderStatus();
  }

  function updateDeleteButton() {
    const showDelete = !state.isCreating && Boolean(state.currentItemId);
    els.deleteButton.hidden = !showDelete;
    els.deleteButton.disabled = !showDelete;
  }

  function updateSaveButtonLabel() {
    if (!els.saveButton) {
      return;
    }

    els.saveButton.textContent = state.isCreating ? "Salva nuovo prodotto" : "Aggiorna prodotto";
  }

  function updateEditorScreenBackLabel() {
    if (!els.editorScreenBackLabel) {
      return;
    }

    els.editorScreenBackLabel.textContent = state.editorReturnView === "browse" ? "Catalogo" : "Home";
  }

  function handleEditorScreenBack() {
    state.editorStep = 0;

    if (state.editorReturnView === "browse") {
      state.view = "browse";
      updateInterfaceState();
      return;
    }

    returnToChooser();
  }

  function returnToChooser() {
    state.view = "chooser";
    state.editorReturnView = "chooser";
    state.currentItemId = "";
    state.isCreating = false;
    state.editorStep = 0;
    updateDeleteButton();
    updateInterfaceState();
  }

  function handleEditorStepBack() {
    if (state.editorStep === 0) {
      handleEditorScreenBack();
      return;
    }

    state.editorStep = Math.max(0, state.editorStep - 1);
    updateEditorStepUI();
  }

  function handleEditorStepNext() {
    if (state.editorStep === 0 && !validatePrimaryStep()) {
      return;
    }

    const lastStepIndex = Math.max(0, els.editorSteps.length - 1);
    if (state.editorStep >= lastStepIndex) {
      return;
    }

    state.editorStep += 1;
    updateEditorStepUI();
  }

  function validatePrimaryStep() {
    return [els.nameInput, els.sectionInput, els.option1PriceInput].every((field) => field.reportValidity());
  }

  function updateEditorStepUI() {
    if (!els.editorSteps?.length) {
      return;
    }

    const labels = ["Base", "Stato", "Extra"];
    const lastStepIndex = els.editorSteps.length - 1;

    els.editorSteps.forEach((stepElement, index) => {
      stepElement.hidden = index !== state.editorStep;
    });

    if (els.editorStepIndicator) {
      els.editorStepIndicator.innerHTML = labels
        .map((label, index) => {
          const classes = ["editor-step-pill"];
          if (index === state.editorStep) {
            classes.push("is-active");
          } else if (index < state.editorStep) {
            classes.push("is-complete");
          }

          return `<span class="${classes.join(" ")}">${index + 1}. ${escapeHtml(label)}</span>`;
        })
        .join("");
    }

    if (els.editorStepBackButton) {
      els.editorStepBackButton.textContent = state.editorStep === 0 ? "← Indietro" : "← Passo prima";
    }

    if (els.editorStepNextButton) {
      els.editorStepNextButton.hidden = state.editorStep >= lastStepIndex;
    }

    if (els.saveButton) {
      els.saveButton.hidden = state.editorStep < lastStepIndex;
    }
  }

  function showBanner(message, tone = "info") {
    if (!message) {
      hideBanner();
      return;
    }

    showHeaderStatus(message, tone, { persistent: false });
  }

  function hideBanner() {
    clearHeaderStatus();
  }

  function showHeaderStatus(message, tone = "info", options = {}) {
    if (!els.headerStatus || !els.headerStatusText) {
      return;
    }

    window.clearTimeout(headerStatusTimer);
    if (els.refreshButton) {
      els.refreshButton.hidden = true;
    }
    els.headerStatus.dataset.tone = tone;
    els.headerStatusText.textContent = message;
    els.headerStatus.hidden = false;

    if (!options.persistent) {
      const timeoutMs = tone === "error" ? 4200 : 2600;
      headerStatusTimer = window.setTimeout(() => {
        clearHeaderStatus();
      }, timeoutMs);
    }
  }

  function clearHeaderStatus() {
    if (!els.headerStatus || !els.headerStatusText) {
      return;
    }

    window.clearTimeout(headerStatusTimer);
    els.headerStatus.hidden = true;
    els.headerStatus.dataset.tone = "";
    els.headerStatusText.textContent = "";
    if (els.refreshButton) {
      els.refreshButton.hidden = false;
    }
  }

  function normalizeToggle(value, fallback) {
    if (typeof value === "boolean") {
      return value;
    }

    const normalized = String(value || "")
      .trim()
      .toLowerCase();

    if (["si", "sì", "yes", "true", "1"].includes(normalized)) {
      return true;
    }
    if (["no", "false", "0"].includes(normalized)) {
      return false;
    }

    return fallback;
  }

  function slugify(value) {
    return String(value || "")
      .normalize("NFD")
      .replace(/[\u0300-\u036f]/g, "")
      .toLowerCase()
      .trim()
      .replace(/[^a-z0-9]+/g, "-")
      .replace(/-+/g, "-")
      .replace(/^-+|-+$/g, "");
  }

  function escapeHtml(value) {
    return String(value || "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#39;");
  }
</script>
