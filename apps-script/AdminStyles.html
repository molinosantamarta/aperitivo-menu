<style>
  :root {
    --bg: #f3f4f6;
    --panel: #ffffff;
    --panel-soft: #f8fafc;
    --text: #111827;
    --text-soft: #6b7280;
    --line: #e5e7eb;
    --line-strong: #d1d5db;
    --accent: #2563eb;
    --accent-soft: #dbeafe;
    --success: #15803d;
    --warning: #b45309;
    --danger: #b91c1c;
    --shadow: 0 10px 28px rgba(15, 23, 42, 0.055);
    --radius-xl: 20px;
    --radius-lg: 16px;
    --radius-md: 12px;
    --shell-padding: 16px;
  }

  * {
    box-sizing: border-box;
  }

  html,
  body {
    margin: 0;
    min-height: 100%;
  }

  body {
    font-family:
      -apple-system,
      BlinkMacSystemFont,
      "SF Pro Text",
      "Segoe UI",
      sans-serif;
    color: var(--text);
    background: var(--bg);
    -webkit-text-size-adjust: 100%;
  }

  body.is-screen-flow-open,
  body.is-utility-modal-open {
    overflow: hidden;
  }

  [hidden] {
    display: none !important;
  }

  button,
  input,
  select,
  textarea {
    font: inherit;
  }

  h1,
  h2,
  h3,
  p {
    margin: 0;
  }

  a {
    color: inherit;
  }

  .admin-shell {
    width: min(100%, 1240px);
    margin: 0 auto;
    padding: var(--shell-padding);
    display: grid;
    gap: 16px;
  }

  .admin-topbar,
  .entry-card,
  .screen-card,
  .utility-modal__dialog {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius-xl);
    box-shadow: var(--shadow);
  }

  .admin-topbar,
  .entry-card,
  .screen-card {
    padding: 18px;
  }

  .admin-topbar__main {
    display: grid;
    gap: 16px;
  }

  .admin-topbar__identity {
    display: grid;
    gap: 6px;
  }

  .admin-kicker,
  .admin-eyebrow {
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent);
  }

  .admin-kicker--title {
    font-size: 0.98rem;
    font-weight: 760;
    letter-spacing: -0.03em;
    line-height: 1;
    text-transform: none;
  }

  .admin-heading {
    display: grid;
    gap: 4px;
  }

  .admin-title {
    font-size: clamp(2rem, 5vw, 2.85rem);
    line-height: 0.94;
    letter-spacing: -0.05em;
    font-weight: 760;
  }

  .admin-title-note {
    color: var(--text-soft);
    font-size: 0.88rem;
    font-weight: 580;
    line-height: 1.3;
  }

  .admin-description {
    max-width: 38rem;
    color: var(--text-soft);
    line-height: 1.45;
    font-size: 0.92rem;
  }

  .admin-topbar__actions {
    display: grid;
    gap: 10px;
    align-items: start;
    justify-items: end;
  }

  .admin-topbar__buttons {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: flex-end;
  }

  .primary-btn,
  .secondary-btn,
  .ghost-btn,
  .danger-btn {
    appearance: none;
    min-height: 42px;
    border-radius: 12px;
    padding: 0.7rem 0.95rem;
    border: 1px solid var(--line-strong);
    background: #fff;
    color: var(--text);
    font-weight: 600;
    cursor: pointer;
    transition:
      border-color 140ms ease,
      background-color 140ms ease,
      box-shadow 140ms ease;
  }

  .primary-btn:hover,
  .secondary-btn:hover,
  .ghost-btn:hover,
  .danger-btn:hover,
  .entry-action:hover,
  .item-row:hover {
    box-shadow: 0 6px 18px rgba(15, 23, 42, 0.08);
  }

  .primary-btn {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  .danger-btn {
    background: #fff7f7;
    border-color: #fecaca;
    color: var(--danger);
  }

  .admin-refresh-button,
  .admin-schema-button {
    width: auto;
    min-width: 0;
  }

  .admin-schema-button {
    color: var(--text-soft);
    font-weight: 550;
    background: var(--panel-soft);
  }

  .admin-schema-button:hover {
    color: var(--text);
    background: #fff;
  }

  .admin-loader {
    position: relative;
    overflow: hidden;
    display: grid;
    gap: 8px;
    width: min(100%, 360px);
    min-height: 52px;
    padding: 9px 12px 10px;
    border: 1px solid rgba(120, 88, 58, 0.1);
    border-radius: 16px;
    background: linear-gradient(180deg, rgba(255, 252, 247, 0.96) 0%, rgba(255, 248, 239, 0.96) 100%);
    box-shadow: 0 8px 20px rgba(56, 41, 26, 0.05);
    color: #75614e;
  }

  .admin-loader__content {
    display: flex;
    align-items: center;
    min-width: 0;
  }

  .admin-loader__label {
    display: block;
    min-width: 0;
    color: rgba(89, 76, 66, 0.92);
    font-size: 0.84rem;
    font-weight: 640;
    line-height: 1.35;
  }

  .admin-loader__bar {
    position: relative;
    width: 100%;
    height: 8px;
    overflow: hidden;
    border-radius: 999px;
    background: rgba(74, 54, 35, 0.08);
    box-shadow: inset 0 0 0 1px rgba(74, 54, 35, 0.04);
  }

  .admin-loader__bar-fill {
    position: absolute;
    inset: 0 auto 0 0;
    width: 38%;
    height: 100%;
    border-radius: inherit;
    background: linear-gradient(90deg, #7aa2ff 0%, var(--accent) 45%, #1d4ed8 100%);
    box-shadow: 0 0 16px rgba(37, 99, 235, 0.22);
    transform: translateX(-120%);
    animation: admin-loader-track 1.5s cubic-bezier(0.22, 1, 0.36, 1) infinite;
  }

  .admin-loader[data-tone="success"] {
    color: var(--success);
    border-color: #bbf7d0;
    background: #f0fdf4;
  }

  .admin-loader[data-tone="error"] {
    color: var(--danger);
    border-color: #fecaca;
    background: #fef2f2;
  }

  .admin-loader[data-tone="success"] .admin-loader__label {
    color: #166534;
  }

  .admin-loader[data-tone="success"] .admin-loader__bar-fill {
    width: 100%;
    transform: translateX(0);
    animation: none;
    background: linear-gradient(135deg, #22c55e 0%, #15803d 100%);
    box-shadow: 0 0 14px rgba(21, 128, 61, 0.14);
  }

  .admin-loader[data-tone="error"] .admin-loader__label {
    color: #b91c1c;
  }

  .admin-loader[data-tone="error"] .admin-loader__bar-fill {
    width: 100%;
    transform: translateX(0);
    animation: none;
    background: linear-gradient(135deg, #f87171 0%, #b91c1c 100%);
    box-shadow: 0 0 14px rgba(185, 28, 28, 0.14);
  }

  .entry-card {
    max-width: 980px;
    display: grid;
    gap: 16px;
  }

  .entry-card__header {
    display: grid;
    gap: 6px;
  }

  .entry-card__description {
    color: var(--text-soft);
    font-size: 0.9rem;
    line-height: 1.45;
    max-width: 30rem;
  }

  .entry-card__actions {
    display: grid;
    gap: 12px;
  }

  .entry-action {
    appearance: none;
    width: 100%;
    border: 1px solid var(--line);
    border-radius: 16px;
    background: var(--panel-soft);
    padding: 14px 15px;
    display: grid;
    grid-template-columns: 40px minmax(0, 1fr);
    gap: 12px;
    align-items: center;
    color: var(--text);
    text-align: left;
    cursor: pointer;
  }

  .entry-action--primary {
    border-color: #bfdbfe;
    background: #eff6ff;
  }

  .entry-action__icon {
    width: 40px;
    height: 40px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 12px;
    background: #fff;
    color: var(--accent);
    font-size: 1.05rem;
    font-weight: 800;
  }

  .entry-action__icon svg {
    width: 18px;
    height: 18px;
    display: block;
  }

  .entry-action__content {
    display: grid;
    gap: 3px;
  }

  .entry-action__content strong {
    font-size: 0.98rem;
    line-height: 1.2;
  }

  .entry-action__content span {
    font-size: 0.85rem;
    line-height: 1.35;
    color: var(--text-soft);
  }

  .screen-modal,
  .utility-modal {
    position: fixed;
    inset: 0;
    z-index: 40;
  }

  .screen-modal--stacked {
    z-index: 42;
  }

  .screen-modal__backdrop,
  .utility-modal__backdrop {
    position: absolute;
    inset: 0;
    background: rgba(17, 24, 39, 0.38);
  }

  .screen-modal__panel,
  .utility-modal__dialog {
    position: relative;
    z-index: 1;
    width: 100%;
    min-height: 100dvh;
    max-height: 100dvh;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 0;
    overscroll-behavior: contain;
    -webkit-overflow-scrolling: touch;
    touch-action: pan-y;
  }

  .screen-card,
  .utility-modal__dialog {
    min-height: 100dvh;
    width: 100%;
    padding:
      max(20px, env(safe-area-inset-top))
      16px
      calc(24px + env(safe-area-inset-bottom))
      16px;
    background: #fff;
  }

  .screen-card--catalog,
  .screen-card--editor {
    display: grid;
    gap: 18px;
  }

  .screen-card__header,
  .screen-card__title-block,
  .editor-group__header,
  .utility-modal__header,
  .utility-modal__content,
  .utility-note,
  .catalog-toolbar,
  .item-form,
  .option-stack {
    display: grid;
    gap: 10px;
  }

  .screen-card__description,
  .catalog-meta,
  .editor-card__meta,
  .item-row__meta,
  .field__hint,
  .utility-note__list,
  .utility-note__link-row {
    color: var(--text-soft);
    font-size: 0.88rem;
    line-height: 1.45;
  }

  .back-link {
    appearance: none;
    width: fit-content;
    min-height: 38px;
    padding: 0;
    border: 0;
    background: transparent;
    color: var(--text-soft);
    display: inline-flex;
    align-items: center;
    gap: 0.45rem;
    font-size: 0.84rem;
    font-weight: 650;
    cursor: pointer;
  }

  .catalog-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 8px 10px;
    border: 1px solid var(--line);
    border-radius: 12px;
    background: #fff;
  }

  .catalog-pill,
  .badge {
    display: inline-flex;
    align-items: center;
    min-height: 24px;
    padding: 0 0.62rem;
    border-radius: 999px;
    font-size: 0.74rem;
    font-weight: 700;
    border: 1px solid var(--line);
    background: #fff;
    color: #4b5563;
  }

  .catalog-pill--strong,
  .badge--info {
    background: var(--accent-soft);
    border-color: #bfdbfe;
    color: var(--accent);
  }

  .badge--success {
    background: #f0fdf4;
    border-color: #bbf7d0;
    color: var(--success);
  }

  .badge--warning {
    background: #fff7ed;
    border-color: #fed7aa;
    color: var(--warning);
  }

  .badge--danger {
    background: #fef2f2;
    border-color: #fecaca;
    color: var(--danger);
  }

  .badge--hidden {
    background: #f3f4f6;
    border-color: var(--line);
    color: var(--text-soft);
  }

  .item-list {
    display: flex;
    flex-direction: column;
    gap: 7px;
    max-height: 58vh;
    overflow: auto;
    padding-right: 4px;
  }

  .item-list__empty {
    padding: 1rem;
    border-radius: 12px;
    border: 1px dashed var(--line-strong);
    background: var(--panel-soft);
    color: var(--text-soft);
  }

  .item-row {
    appearance: none;
    -webkit-appearance: none;
    flex: 0 0 auto;
    width: 100%;
    min-height: 0;
    padding: 12px 13px;
    border: 1px solid var(--line);
    border-radius: 14px;
    background: #fff;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    gap: 8px;
    text-align: left;
    cursor: pointer;
  }

  .item-row--success {
    background: #ffffff;
  }

  .item-row--warning {
    background: #fff8f1;
    border-color: #fed7aa;
  }

  .item-row--warning .item-row__name,
  .item-row--warning .item-row__meta,
  .item-row--warning .item-row__price {
    opacity: 0.66;
  }

  .item-row--danger {
    background: #fef2f2;
    border-color: #fecaca;
  }

  .item-row--hidden {
    background: #f3f4f6;
    border-color: #d1d5db;
  }

  .item-row--info {
    background: #eff6ff;
    border-color: #bfdbfe;
  }

  .item-row.is-active {
    border-color: #93c5fd;
    background: #eff6ff;
  }

  .item-row__top {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    align-items: start;
  }

  .item-row__name {
    font-weight: 650;
    font-size: 0.93rem;
    line-height: 1.28;
  }

  .item-row__price {
    display: inline-flex;
    align-items: center;
    min-height: 24px;
    padding: 0 0.62rem;
    border-radius: 999px;
    background: var(--panel-soft);
    border: 1px solid var(--line);
    font-size: 0.78rem;
    font-weight: 700;
    white-space: nowrap;
  }

  .item-row__bottom {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    flex-wrap: wrap;
  }

  .item-row__meta,
  .item-row__section,
  .badge-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .item-row__section {
    align-items: center;
    min-width: 0;
    font-size: 0.84rem;
    font-weight: 560;
    color: var(--text-soft);
    line-height: 1.3;
  }

  .badge-row {
    justify-content: flex-start;
  }

  .field,
  .checkbox-field {
    display: grid;
    gap: 0.42rem;
  }

  .field span,
  .checkbox-field span {
    font-size: 0.86rem;
    font-weight: 600;
    color: var(--text);
  }

  .field input,
  .field select,
  .field textarea {
    width: 100%;
    min-height: 42px;
    border: 1px solid var(--line-strong);
    background: #fff;
    border-radius: 12px;
    padding: 0.68rem 0.82rem;
    color: var(--text);
    resize: vertical;
  }

  .field textarea {
    min-height: 116px;
  }

  .field input[type="file"] {
    min-height: 50px;
    padding: 0.5rem 0.55rem;
  }

  .field input[type="file"]::file-selector-button {
    margin-right: 0.85rem;
    border: 1px solid #bfdbfe;
    border-radius: 10px;
    padding: 0.55rem 0.8rem;
    background: #eff6ff;
    color: var(--accent);
    font-weight: 600;
    cursor: pointer;
  }

  .field input:focus,
  .field select:focus,
  .field textarea:focus {
    outline: 3px solid rgba(37, 99, 235, 0.14);
    border-color: #93c5fd;
  }

  .form-grid,
  .form-grid--compact,
  .option-grid,
  .option-grid--main {
    display: grid;
    grid-template-columns: 1fr;
    gap: 14px;
  }

  .field--span-2 {
    grid-column: auto;
  }

  .item-form {
    gap: 18px;
  }

  .item-form__layout {
    display: grid;
    gap: 16px;
  }

  .editor-group,
  .option-card {
    display: grid;
    gap: 12px;
    padding: 15px;
    border: 1px solid var(--line);
    border-radius: 16px;
    background: #fff;
  }

  .editor-group--status {
    background: var(--panel-soft);
  }

  .editor-group--status[data-tone="success"] {
    background: #f0fdf4;
    border-color: #bbf7d0;
  }

  .editor-group--status[data-tone="warning"] {
    background: #fff7ed;
    border-color: #fed7aa;
  }

  .editor-group--status[data-tone="danger"] {
    background: #fef2f2;
    border-color: #fecaca;
  }

  .editor-group--status[data-tone="hidden"] {
    background: #f3f4f6;
    border-color: #d1d5db;
  }

  .editor-group--status[data-tone="info"] {
    background: #eff6ff;
    border-color: #bfdbfe;
  }

  .status-summary {
    display: grid;
    gap: 4px;
    padding: 12px 13px;
    border: 1px solid rgba(255, 255, 255, 0.72);
    border-radius: 12px;
    background: rgba(255, 255, 255, 0.6);
  }

  .status-summary strong {
    font-size: 0.88rem;
    line-height: 1.25;
  }

  .status-summary span {
    font-size: 0.81rem;
    color: var(--text-soft);
    line-height: 1.45;
  }

  .option-card--advanced {
    background: var(--panel-soft);
  }

  .option-card summary {
    min-height: 42px;
    display: flex;
    align-items: center;
    cursor: pointer;
    font-weight: 700;
  }

  .option-grid--stacked,
  .form-grid--advanced-toggles {
    margin-top: 14px;
  }

  .image-preview-card {
    display: grid;
    gap: 12px;
    grid-template-columns: 120px minmax(0, 1fr);
    align-items: center;
    padding: 12px;
    border: 1px solid var(--line);
    border-radius: 12px;
    background: var(--panel-soft);
  }

  .image-preview-card__media {
    aspect-ratio: 1 / 1;
    overflow: hidden;
    border-radius: 12px;
    border: 1px solid var(--line);
    background: #fff;
  }

  .image-preview-card__media img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .image-preview-card__content {
    display: grid;
    gap: 4px;
    min-width: 0;
  }

  .image-preview-card__content strong {
    font-size: 0.94rem;
    font-weight: 650;
  }

  .image-preview-card__content span {
    color: var(--text-soft);
    font-size: 0.84rem;
    line-height: 1.45;
    word-break: break-word;
  }

  .checkbox-field {
    grid-template-columns: auto 1fr;
    align-items: center;
    gap: 10px;
    padding: 0.84rem 0.92rem;
    border: 1px solid var(--line);
    border-radius: 12px;
    background: #fff;
  }

  .checkbox-field input {
    width: 18px;
    height: 18px;
    margin: 0;
  }

  .form-actions {
    position: sticky;
    bottom: 0;
    display: grid;
    gap: 10px;
    padding-top: 14px;
    margin-top: 4px;
    border-top: 1px solid var(--line);
    background: linear-gradient(180deg, rgba(255, 255, 255, 0), #ffffff 18%);
  }

  .form-actions__group {
    display: grid;
    gap: 10px;
  }

  .utility-modal__dialog {
    padding:
      max(20px, env(safe-area-inset-top))
      16px
      calc(24px + env(safe-area-inset-bottom))
      16px;
  }

  .utility-modal__header {
    grid-template-columns: minmax(0, 1fr) auto;
    align-items: start;
    gap: 14px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--line);
  }

  .utility-modal__header > div {
    display: grid;
    gap: 6px;
  }

  .utility-modal__content {
    gap: 16px;
    padding-top: 4px;
  }

  .utility-note {
    border: 1px solid var(--line);
    border-radius: 16px;
    background: #fff;
    padding: 18px;
    gap: 10px;
  }

  .utility-note h3 {
    font-size: 1rem;
    line-height: 1.25;
  }

  .utility-note p {
    color: var(--text-soft);
    line-height: 1.5;
  }

  .utility-note__list {
    margin: 0;
    padding-left: 1.15rem;
    display: grid;
    gap: 0.65rem;
    line-height: 1.5;
  }

  .utility-note__list li {
    padding-left: 0.1rem;
  }

  .utility-note__link-row {
    margin-top: 2px;
  }

  .utility-note__link-row a {
    color: var(--accent);
    font-weight: 700;
    text-decoration: none;
  }

  .utility-note__link-row a:hover {
    text-decoration: underline;
  }

  .icon-btn {
    display: inline-grid;
    place-items: center;
    width: auto;
  }

  .icon-btn--compact {
    width: 42px;
    min-width: 42px;
    padding: 0;
  }

  .icon-btn__glyph {
    width: 18px;
    height: 18px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }

  .icon-btn__glyph svg {
    width: 100%;
    height: 100%;
    display: block;
  }

  .sr-only {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border: 0;
  }

  @keyframes admin-loader-track {
    0% {
      transform: translateX(-120%);
    }

    100% {
      transform: translateX(250%);
    }
  }

  @media (min-width: 760px) {
    :root {
      --shell-padding: 22px;
    }

    .admin-topbar,
    .entry-card,
    .screen-card {
      padding: 22px;
    }

    .admin-topbar__main {
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: start;
      column-gap: 24px;
    }

    .admin-topbar__actions {
      justify-items: end;
    }
