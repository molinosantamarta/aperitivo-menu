<style>
  :root {
    --bg: #f6efe5;
    --surface: rgba(255, 251, 246, 0.94);
    --surface-strong: #fffdf9;
    --ink: #23160f;
    --ink-soft: rgba(35, 22, 15, 0.68);
    --line: rgba(106, 70, 44, 0.12);
    --accent: #9d4f16;
    --accent-strong: #7e3a0c;
    --accent-soft: rgba(157, 79, 22, 0.12);
    --success: #1d6a47;
    --warning: #9c5d13;
    --danger: #a1372b;
    --shadow: 0 18px 42px rgba(79, 46, 21, 0.12);
    --radius-lg: 24px;
    --radius-md: 18px;
    --radius-sm: 12px;
    --help-toggle-reserved-space: calc(92px + env(safe-area-inset-bottom));
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    font-family: "Avenir Next", "Segoe UI", sans-serif;
    -webkit-text-size-adjust: 100%;
    color: var(--ink);
    background:
      radial-gradient(circle at top left, rgba(255, 220, 179, 0.72), transparent 32%),
      radial-gradient(circle at top right, rgba(205, 232, 213, 0.36), transparent 28%),
      linear-gradient(180deg, #f8f1e8 0%, #f1e7d9 100%);
  }

body.is-screen-flow-open {
  overflow: hidden;
}

body.is-utility-modal-open {
  overflow: hidden;
}

  [hidden] {
    display: none !important;
  }

  button,
  input,
  select,
  textarea {
    font: inherit;
  }

  .admin-shell {
    min-height: 100vh;
    padding: 12px 12px var(--help-toggle-reserved-space);
  }

  .admin-topbar,
  .sidebar-card,
  .editor-card {
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    background: var(--surface);
    box-shadow: var(--shadow);
    backdrop-filter: blur(12px);
  }

  .admin-topbar,
  .sidebar-card,
  .editor-card {
    padding: 16px;
  }

  .admin-topbar {
    display: grid;
    gap: 14px;
  }

  .admin-intro {
    max-width: 720px;
    display: grid;
    gap: 6px;
  }

  .admin-intro__toolbar {
    display: grid;
    gap: 10px;
    justify-items: center;
    margin-top: 4px;
  }

  .brand-lockup {
    display: inline-flex;
    align-items: center;
    gap: 12px;
  }

  .brand-icon {
    width: 54px;
    height: 54px;
    flex: 0 0 auto;
    object-fit: cover;
    border-radius: 18px;
    background: rgba(255, 255, 255, 0.76);
    box-shadow: 0 14px 28px rgba(79, 46, 21, 0.1);
  }

  h1,
  h2,
  h3,
  p {
    margin: 0;
  }

  h1 {
    font-size: clamp(1.55rem, 8vw, 2.05rem);
    line-height: 1.04;
    letter-spacing: -0.04em;
  }

  h2 {
    font-size: 1.1rem;
    line-height: 1.15;
    letter-spacing: -0.02em;
  }

  h3 {
    font-size: 0.96rem;
    line-height: 1.2;
  }

  .brand-title {
    position: relative;
    display: inline-block;
    margin-top: 0;
    padding: 0.02em 0.08em 0.12em 0.04em;
    font-size: clamp(2.05rem, 11vw, 2.75rem);
    font-weight: 850;
    line-height: 0.92;
    letter-spacing: -0.07em;
    color: #770505;
    text-shadow:
      0.03em 0.03em 0 rgba(255, 240, 220, 0.9),
      0.055em 0.055em 0 rgba(157, 79, 22, 0.12);
    isolation: isolate;
  }

  .brand-title__main,
  .brand-title__accent {
    position: relative;
    z-index: 1;
  }

  .brand-title__accent {
    color: #4a0303;
  }

  .brand-title::before {
    content: "";
    position: absolute;
    left: -0.04em;
    right: 0.02em;
    top: 0.14em;
    bottom: 0.04em;
    border-radius: 1em;
    background: linear-gradient(135deg, rgba(255, 244, 232, 0.82), rgba(255, 234, 208, 0.42));
    box-shadow:
      0 10px 22px rgba(157, 79, 22, 0.08),
      inset 0 0 0 1px rgba(157, 79, 22, 0.08);
    transform: rotate(-1.1deg);
    z-index: -2;
  }

  .brand-title::after {
    content: "";
    position: absolute;
    left: 0.22em;
    right: 0.16em;
    bottom: 0.04em;
    height: 0.18em;
    border-radius: 999px;
    background: linear-gradient(135deg, rgba(207, 127, 47, 0.56), rgba(157, 79, 22, 0.22));
    transform: rotate(-0.8deg);
    z-index: -1;
  }

  .admin-kicker,
  .catalog-meta,
  .editor-card__meta,
  .hint-copy,
  .item-row__id,
  .item-row__description {
    color: var(--ink-soft);
  }

  .admin-kicker {
    margin-top: 6px;
    margin-inline: auto;
    max-width: 38ch;
    font-size: 1.1rem;
    font-weight: 900;
    line-height: 1.04;
    letter-spacing: -0.035em;
    color: var(--accent-strong);
    text-align: center;
  }

  .admin-intro__actions {
    display: flex;
    justify-content: center;
    align-items: center;
    margin-top: 4px;
    min-height: 40px;
  }

  .admin-public-link {
    width: auto;
    min-width: 0;
  }

  .live-summary {
    display: grid;
    gap: 8px;
    margin-top: 2px;
    padding: 12px 14px;
    border: 1px solid rgba(106, 70, 44, 0.1);
    border-radius: var(--radius-md);
    background: rgba(255, 255, 255, 0.68);
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.55);
  }

  .live-summary__row,
  .live-summary__links {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
  }

  .live-summary__pill {
    display: inline-flex;
    align-items: center;
    min-height: 30px;
    padding: 0 0.78rem;
    border-radius: 999px;
    background: rgba(157, 79, 22, 0.08);
    color: var(--accent-strong);
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: -0.01em;
  }

  .live-summary__pill--strong {
    background: rgba(157, 79, 22, 0.14);
  }

  .live-summary__text {
    color: var(--ink-soft);
    font-size: 0.84rem;
    line-height: 1.4;
    text-align: center;
  }

  .live-summary__link {
    color: var(--accent-strong);
    font-size: 0.82rem;
    font-weight: 800;
    text-decoration: none;
  }

  .live-summary__link:hover {
    text-decoration: underline;
  }

  .admin-refresh-button {
    width: auto;
    min-width: 0;
    min-height: 40px;
    padding: 0.65rem 1rem;
    border-radius: 999px;
    font-size: 0.84rem;
    font-weight: 800;
    line-height: 1;
  }

  .admin-loader {
    position: relative;
    overflow: hidden;
    display: inline-flex;
    align-items: center;
    gap: 0.55rem;
    min-height: 40px;
    padding: 0.65rem 1rem;
    border: 1px solid rgba(157, 79, 22, 0.14);
    border-radius: 999px;
    background: rgba(255, 247, 238, 0.92);
    color: var(--accent-strong);
    font-size: 0.82rem;
    font-weight: 700;
    line-height: 1.1;
    text-align: center;
    box-shadow: 0 10px 22px rgba(79, 46, 21, 0.06);
    max-width: min(100%, 420px);
  }

  .admin-loader__dot {
    width: 10px;
    height: 10px;
    flex: 0 0 auto;
    border-radius: 50%;
    background: currentColor;
    animation: admin-loader-pulse 1.15s ease-in-out infinite;
  }

  .admin-loader::after {
    content: "";
    position: absolute;
    left: 10px;
    right: 10px;
    bottom: 6px;
    height: 3px;
    border-radius: 999px;
    background:
      linear-gradient(90deg, transparent 0%, currentColor 20%, currentColor 80%, transparent 100%);
    opacity: 0.36;
    transform: translateX(-120%);
    animation: admin-loader-track 1.5s linear infinite;
  }

  .admin-loader[data-tone="success"] {
    border-color: rgba(29, 106, 71, 0.2);
    background: rgba(234, 249, 242, 0.94);
    color: var(--success);
  }

  .admin-loader[data-tone="error"] {
    border-color: rgba(161, 55, 43, 0.2);
    background: rgba(254, 242, 240, 0.96);
    color: var(--danger);
  }

  .admin-loader[data-tone="info"] {
    border-color: rgba(157, 79, 22, 0.16);
    background: rgba(255, 247, 238, 0.92);
    color: var(--accent-strong);
  }

  .primary-btn,
  .secondary-btn,
  .ghost-btn,
  .danger-btn {
    appearance: none;
    width: 100%;
    min-height: 48px;
    border: 0;
    border-radius: 999px;
    padding: 0.8rem 1.05rem;
    font-weight: 700;
    cursor: pointer;
    transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease;
  }

  .primary-btn {
    background: linear-gradient(135deg, var(--accent) 0%, #c67224 100%);
    color: #fffaf5;
    box-shadow: 0 10px 24px rgba(157, 79, 22, 0.22);
  }

  .secondary-btn {
    background: rgba(255, 255, 255, 0.88);
    color: var(--ink);
    border: 1px solid rgba(157, 79, 22, 0.14);
  }

  .ghost-btn {
    background: var(--accent-soft);
    color: var(--accent-strong);
  }

  .icon-btn {
    width: 100%;
    min-width: 0;
    padding: 0.58rem 0.7rem 0.62rem;
    display: inline-grid;
    justify-items: center;
    align-content: center;
    gap: 0.28rem;
    border-radius: 18px;
  }

  .icon-btn--compact {
    width: 48px;
    min-width: 48px;
    padding: 0;
    border-radius: 50%;
  }

  .icon-btn__glyph {
    width: 22px;
    height: 22px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }

  .icon-btn__glyph svg {
    width: 100%;
    height: 100%;
    display: block;
  }

  .icon-btn__glyph--plus {
    width: 24px;
    height: 24px;
  }

  .sr-only {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border: 0;
  }

  .danger-btn {
    background: rgba(161, 55, 43, 0.12);
    color: var(--danger);
    border: 1px solid rgba(161, 55, 43, 0.2);
  }

  .primary-btn:hover,
  .secondary-btn:hover,
  .ghost-btn:hover,
  .danger-btn:hover {
    transform: translateY(-1px);
  }

  @keyframes admin-loader-pulse {
    0%,
    100% {
      transform: scale(0.82);
      opacity: 0.42;
    }

    50% {
      transform: scale(1);
      opacity: 1;
    }
  }

  @keyframes admin-loader-track {
    0% {
      transform: translateX(-120%);
    }

    100% {
      transform: translateX(120%);
    }
  }

  .screen-modal[hidden] {
    display: none;
  }

  .screen-modal {
    position: fixed;
    inset: 0;
    z-index: 30;
    display: block;
    overflow: hidden;
  }

  .screen-modal--stacked {
    z-index: 32;
  }

  .screen-modal__backdrop {
    position: absolute;
    inset: 0;
    background: rgba(27, 18, 12, 0.32);
    backdrop-filter: blur(10px);
  }

  .screen-modal--stacked .screen-modal__backdrop {
    background: rgba(27, 18, 12, 0.22);
  }

  .screen-modal__panel {
    position: relative;
    z-index: 1;
    width: 100%;
    height: 100dvh;
    overflow-x: hidden;
    overflow-y: auto;
    padding: 0;
    overscroll-behavior: contain;
    -webkit-overflow-scrolling: touch;
    touch-action: pan-y;
  }

  .screen-card {
    width: 100%;
    min-height: 100dvh;
    border: 0;
    border-radius: 0;
    box-shadow: none;
    backdrop-filter: none;
    padding:
      max(16px, env(safe-area-inset-top))
      16px
      calc(var(--help-toggle-reserved-space) + 8px)
      16px;
  }

  .admin-help-toggle {
    position: fixed;
    left: 50%;
    bottom: calc(12px + env(safe-area-inset-bottom));
    transform: translateX(-50%);
    z-index: 36;
    width: auto;
    min-width: 0;
    min-height: 44px;
    padding: 0.75rem 1rem;
    border: 1px solid rgba(157, 79, 22, 0.18);
    border-radius: 999px;
    background: rgba(255, 251, 246, 0.96);
    color: var(--accent-strong);
    box-shadow: 0 16px 32px rgba(79, 46, 21, 0.14);
    backdrop-filter: blur(14px);
  }

  .utility-modal[hidden] {
    display: none;
  }

  .utility-modal {
    position: fixed;
    inset: 0;
    z-index: 40;
    display: block;
    padding: 0;
  }

  .utility-modal__backdrop {
    position: absolute;
    inset: 0;
    background: rgba(27, 18, 12, 0.4);
    backdrop-filter: blur(10px);
  }

  .utility-modal__dialog {
    position: relative;
    z-index: 1;
    width: 100%;
    min-height: 100dvh;
    max-height: none;
    overflow: auto;
    padding:
      max(16px, env(safe-area-inset-top))
      16px
      calc(var(--help-toggle-reserved-space) + 8px)
      16px;
    border: 0;
    border-radius: 0;
    background: rgba(255, 252, 248, 0.98);
    box-shadow: none;
  }

  .utility-modal__header {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap: 14px;
    align-items: start;
  }

  .utility-modal__content {
    display: grid;
    gap: 14px;
    margin-top: 16px;
  }

  .utility-note {
    display: grid;
    gap: 8px;
    padding: 14px;
    border: 1px solid rgba(106, 70, 44, 0.1);
    border-radius: var(--radius-md);
    background: rgba(255, 255, 255, 0.72);
  }

  .utility-note__list {
    margin: 0;
    padding-left: 1.1rem;
    display: grid;
    gap: 0.55rem;
    line-height: 1.4;
  }

  .entry-card {
    margin-top: 16px;
    padding: 16px;
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    background: var(--surface);
    box-shadow: var(--shadow);
    display: grid;
    gap: 16px;
  }

  .entry-card__header {
    display: grid;
    gap: 8px;
  }

  .entry-card__actions {
    display: grid;
    gap: 12px;
  }

  .entry-action {
    appearance: none;
    width: 100%;
    padding: 16px;
    border: 1px solid rgba(106, 70, 44, 0.12);
    border-radius: 20px;
    background: rgba(255, 255, 255, 0.78);
    color: var(--ink);
    text-align: left;
    display: grid;
    grid-template-columns: 44px minmax(0, 1fr);
    gap: 12px;
    align-items: center;
    cursor: pointer;
  }

  .entry-action--primary {
    background: linear-gradient(135deg, rgba(157, 79, 22, 0.14), rgba(198, 114, 36, 0.12));
    border-color: rgba(157, 79, 22, 0.18);
  }

  .entry-action__icon {
    width: 44px;
    height: 44px;
    border-radius: 14px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: rgba(35, 22, 15, 0.06);
    font-size: 1.4rem;
    font-weight: 900;
  }

  .entry-action__icon svg {
    width: 22px;
    height: 22px;
    display: block;
  }

  .entry-action__content {
    display: grid;
    gap: 4px;
  }

  .entry-action__content strong {
    font-size: 1rem;
    line-height: 1.1;
  }

  .entry-action__content span {
    color: var(--ink-soft);
    font-size: 0.88rem;
    line-height: 1.35;
  }

  .sidebar-card,
  .editor-card {
    display: grid;
    gap: 16px;
  }

  .back-link {
    appearance: none;
    width: fit-content;
    min-height: 38px;
    border: 0;
    padding: 0;
    background: transparent;
    color: var(--accent-strong);
    display: inline-flex;
    align-items: center;
    gap: 0.45rem;
    font-size: 0.84rem;
    font-weight: 800;
    letter-spacing: -0.01em;
    cursor: pointer;
  }

  .sidebar-card__header,
  .editor-card__header {
    display: grid;
    gap: 6px;
  }

  .sidebar-card__header--stack,
  .editor-card__header--stack {
    gap: 10px;
  }

  .editor-card__heading {
    display: grid;
    gap: 6px;
  }

  .hint-copy,
  .catalog-meta,
  .editor-card__meta {
    font-size: 0.88rem;
    line-height: 1.4;
  }

  .sidebar-filters,
  .item-form,
  .option-stack {
    display: grid;
    gap: 14px;
  }

  .screen-modal__panel--catalog .screen-card {
    display: grid;
    grid-template-rows: auto auto auto minmax(0, 1fr);
  }

  .screen-modal__panel--catalog .item-list {
    max-height: none;
    min-height: 0;
  }

  .editor-group {
    display: grid;
    gap: 16px;
    padding: 16px;
    border-radius: var(--radius-md);
    border: 1px solid rgba(106, 70, 44, 0.1);
    background: rgba(255, 255, 255, 0.58);
  }

  .editor-group__header {
    display: grid;
    gap: 6px;
  }

  .editor-group__eyebrow {
    font-size: 0.72rem;
    font-weight: 900;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent-strong);
  }

  .catalog-meta {
    padding: 12px 14px;
    border-radius: var(--radius-md);
    border: 1px solid rgba(106, 70, 44, 0.1);
    background: rgba(255, 255, 255, 0.68);
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .catalog-pill {
    display: inline-flex;
    align-items: center;
    min-height: 30px;
    padding: 0 0.76rem;
    border-radius: 999px;
    background: rgba(157, 79, 22, 0.08);
    color: var(--accent-strong);
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: -0.01em;
  }

  .catalog-pill--strong {
    background: rgba(157, 79, 22, 0.14);
  }

  .field,
  .checkbox-field {
    display: grid;
    gap: 0.42rem;
  }

  .field span,
  .checkbox-field span {
    font-size: 0.86rem;
    font-weight: 600;
    color: rgba(35, 22, 15, 0.84);
  }

  .field__hint {
    color: var(--ink-soft);
    font-size: 0.78rem;
    line-height: 1.35;
  }

  .field input,
  .field select,
  .field textarea {
    width: 100%;
    min-height: 48px;
    border: 1px solid rgba(88, 56, 31, 0.12);
    background: var(--surface-strong);
    border-radius: var(--radius-sm);
    padding: 0.86rem 0.92rem;
    color: var(--ink);
    resize: vertical;
  }

  .field textarea {
    min-height: 112px;
  }

  .field input:focus,
  .field select:focus,
  .field textarea:focus {
    outline: 2px solid rgba(198, 114, 36, 0.18);
    border-color: rgba(157, 79, 22, 0.28);
  }

  .form-grid,
  .form-grid--compact,
  .option-grid,
  .option-grid--main {
    display: grid;
    grid-template-columns: 1fr;
    gap: 14px;
  }

  .field--span-2 {
    grid-column: auto;
  }

  .option-card {
    display: grid;
    gap: 14px;
    padding: 16px;
    border-radius: var(--radius-md);
    border: 1px solid rgba(106, 70, 44, 0.1);
    background: rgba(255, 255, 255, 0.72);
  }

  .option-card--advanced {
    gap: 12px;
  }

  .option-card--advanced[open] > summary {
    margin-bottom: 2px;
  }

  .option-card--nested {
    background: rgba(255, 255, 255, 0.58);
  }

  .option-card summary {
    min-height: 44px;
    display: flex;
    align-items: center;
    cursor: pointer;
    font-weight: 700;
  }

  .option-grid--stacked {
    margin-top: 14px;
  }

  .form-grid--advanced-toggles {
    margin-top: 14px;
  }

  .checkbox-field {
    grid-template-columns: auto 1fr;
    align-items: center;
    gap: 10px;
    padding: 0.8rem 0.92rem;
    border-radius: var(--radius-sm);
    background: rgba(255, 255, 255, 0.66);
    border: 1px solid rgba(88, 56, 31, 0.08);
  }

  .checkbox-field input {
    width: 18px;
    height: 18px;
    margin: 0;
  }

  .item-list {
    display: grid;
    gap: 10px;
    overflow: auto;
    max-height: 40vh;
    padding-right: 4px;
  }

  .item-list__empty {
    padding: 1rem;
    border-radius: var(--radius-md);
    background: rgba(255, 255, 255, 0.65);
    color: var(--ink-soft);
  }

  .item-row {
    width: 100%;
    min-height: 76px;
    padding: 12px 13px;
    border: 1px solid transparent;
    border-radius: var(--radius-md);
    background: rgba(255, 255, 255, 0.74);
    text-align: left;
    cursor: pointer;
    display: grid;
    gap: 8px;
  }

  .item-row:hover,
  .item-row.is-active {
    border-color: rgba(157, 79, 22, 0.2);
    background: rgba(255, 249, 243, 0.96);
  }

  .item-row__top {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 6px;
  }

  .item-row__name {
    font-weight: 700;
    line-height: 1.15;
  }

  .item-row__price {
    display: inline-flex;
    align-items: center;
    min-height: 28px;
    padding: 0 0.7rem;
    border-radius: 999px;
    background: rgba(35, 22, 15, 0.06);
    color: rgba(35, 22, 15, 0.82);
    font-size: 0.8rem;
    font-weight: 800;
    letter-spacing: -0.01em;
  }

  .item-row__meta {
    display: flex;
    flex-wrap: wrap;
    gap: 6px 10px;
